name: Docs

# Manual only — publishes the TypeScript API reference (typedoc) to GitHub Pages.
# Requires Pages to be enabled for the repo (Settings → Pages → Source: GitHub Actions).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm run docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: node/docs
      - id: deployment
        uses: actions/deploy-pages@v4
